name: Sync Kinescope lectures

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build lecture catalog
        env:
          KINESCOPE_API_TOKEN: ${{ secrets.KINESCOPE_API_TOKEN }}
          KINESCOPE_PROJECT_ID: ${{ secrets.KINESCOPE_PROJECT_ID }}
        run: node scripts/sync-kinescope.mjs

      - name: Publish changes
        run: |
          if git diff --quiet -- lectures/catalog.json; then
            echo "Catalog has not changed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lectures/catalog.json
          git commit -m "Update Kinescope lecture catalog"
          git push
