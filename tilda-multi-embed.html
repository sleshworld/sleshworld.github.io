      background: transparent;
      padding: 8px 2px;
      font-size: 20px;
      font-weight: 800;
      text-align: right;
    }

    .percent-input input:focus {
      outline-offset: 0;
    }

    .action-cell-label {
      display: none;
    }

    .icon-button {
      display: inline-flex;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--line);
      border-radius: 50%;
      background: var(--paper);
      color: var(--ink);
      font-size: 26px;
      font-weight: 500;
      line-height: 1;
    }

    .icon-button:hover {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .remove-action-row {
      width: 32px;
      height: 32px;
      align-self: start;
      justify-self: center;
      margin-top: 9px;
      font-size: 21px;
    }

    .remove-action-row:disabled {
      cursor: default;
      opacity: 0.25;
    }

    .remove-action-row:disabled:hover {
      background: var(--paper);
      color: var(--ink);
    }

    .add-action-row {
      margin-top: 12px;
    }

    .radio-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .radio-card {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 48px;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 9px 11px;
      background: var(--paper);
      font-weight: 700;
    }

    .radio-card:has(input:checked) {
      background: var(--accent);
      box-shadow: 3px 3px 0 var(--line);
    }

    .radio-card input {
      width: auto;
      accent-color: var(--ink);
    }

    .branch-box {
      display: grid;
      gap: 13px;
      border: 2px dashed var(--line);
      border-radius: 18px;
      background: #fffaf7;
      padding: 15px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .switch-row input {
      width: auto;
      accent-color: var(--accent);
    }

    .empty-state {
      align-self: start;
      display: grid;
      gap: 14px;
    }

    .empty-state h2 {
      margin: 0;
      max-width: 620px;
      font-size: 58px;
      line-height: 0.95;
      font-weight: 800;
      text-transform: uppercase;
    }

    .empty-state p {
      margin: 0;
      max-width: 560px;
      color: var(--ink-soft);
      font-weight: 600;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      max-width: min(560px, calc(100vw - 28px));
      border: 2px solid var(--line);
      border-radius: 999px;
      background: var(--ink);
      color: var(--paper);
      padding: 11px 16px;
      font-weight: 700;
      text-align: center;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 10;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden,
    .print-root {
      display: none;
    }

    @media (max-width: 1500px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 760px) {
      .actions-table {
        overflow: visible;
        border: 0;
        border-radius: 0;
      }

      .actions-table-head {
        display: none;
      }

      .actions-table-body {
        display: grid;
        gap: 12px;
      }

      .action-table-row {
        grid-template-columns: 1fr;
        border: 2px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .registry-table-triggers .action-table-row {
        grid-template-columns: 1fr;
      }

      .action-table-cell {
        display: grid;
        grid-template-columns: minmax(126px, 0.32fr) 1fr;
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }

      .action-cell-label {
        display: flex;
        align-items: center;
        background: var(--ink);
        color: var(--paper);
        padding: 7px 10px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .action-table-cell textarea {
        min-height: 72px;
      }

      .percent-input {
        min-height: 72px;
      }

      .remove-action-row {
        justify-self: end;
        margin: 8px;
      }
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 2px solid var(--line);
      }

      .brand {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      .entry-list {
        max-height: 260px;
      }

      .topbar {
        position: static;
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      :host {
        background-size: 28px 28px;
      }

      .sidebar,
      .editor-panel,
      .empty-state,
      .topbar {
        padding: 16px;
      }

      .brand,
      .create-grid,
      .meta-row,
      .storage-note,
      .radio-grid {
        grid-template-columns: 1fr;
      }

      .actions .button {
        flex: 1 1 148px;
      }

      .section {
        padding: 14px;
        box-shadow: 5px 5px 0 var(--line);
      }

      .section-header {
        grid-template-columns: 1fr;
      }

      .step-index {
        width: fit-content;
      }

      .range-row {
        grid-template-columns: 1fr;
      }

      .actions-sheet-heading {
        align-items: flex-start;
        flex-direction: column;
      }

      .protocol-intro {
        align-items: stretch;
        flex-direction: column;
        padding: 14px;
      }

      .protocol-intro h2 {
        font-size: 22px;
      }

      .protocol-intro-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .scenario-report-gate {
        align-items: stretch;
        flex-direction: column;
        padding: 14px;
      }

      .report-switch {
        width: 100%;
      }

      .protocol-count {
        width: fit-content;
      }

      .protocol-section-header {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .protocol-section-header h2 {
        padding: 11px 12px;
        font-size: 15px;
      }

      .protocol-fields,
      .scenario-phase[data-protocol-step="02"] .protocol-fields,
      .feeling-curve-fields {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .scenario-phase[data-protocol-step="02"] [data-field-key="preparation"],
      .feeling-curve-fields [data-field-key="bodySensations"] {
        grid-column: auto;
      }

      .entry-list-item {
        grid-template-columns: 38px minmax(0, 1fr);
      }

      .entry-list-index {
        grid-row: 1 / span 2;
      }

      .entry-list-controls {
        display: flex;
        grid-column: 2;
        justify-content: flex-end;
        border-top: 1px solid var(--line);
        border-left: 0;
        padding: 7px;
      }

      .action-table-cell {
        grid-template-columns: 104px 1fr;
      }

      .action-cell-label {
        padding: 6px 7px;
        font-size: 9px;
      }
    }

    /* Quiet monochrome surfaces with a single coral accent. */
    .app-shell {
      grid-template-columns: minmax(290px, 330px) minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;

      border-right: 1px solid var(--line-soft);

    .brand {

      color: var(--ink);

    }

      text-align: left;
    }

    .brand-home-button:hover h1 {

    }

    .button {

    .create-grid .button.active {

    .button.danger {

      background: var(--danger);
      color: var(--paper);
    }

    .confirm-dialog {
      width: min(460px, calc(100% - 32px));

      background: transparent;
      color: var(--ink);
      padding: 0;

    .confirm-dialog::backdrop {
      background: rgba(22, 22, 22, 0.58);
      backdrop-filter: blur(3px);
    }

    .confirm-dialog-panel {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: var(--paper);
      padding: 28px;
      box-shadow: 0 24px 70px rgba(22, 22, 22, 0.18);
    }

    .confirm-dialog-kicker {
      margin: 0 0 8px;
      color: var(--danger);
      font-size: 11px;
      font-weight: 700;

    }

    .confirm-dialog h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.12;
    }

    .confirm-dialog h2 + p {
      margin: 12px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .confirm-dialog-record {
      margin: 0;
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      background: #fafafa;
      padding: 14px 0;
      font-size: 15px;
      font-weight: 600;
      overflow-wrap: anywhere;

    .confirm-dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .button.confirm-delete-button,
    .button.confirm-delete-button:hover {
      border-color: var(--danger);
      background: var(--danger);
      color: var(--paper);
    }

    .storage-intro-dialog .confirm-dialog-kicker {
      color: var(--ink);
    }

    .storage-intro-dialog {
      width: min(540px, calc(100% - 32px));
    }

    .storage-intro-heading {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .storage-intro-sign {
      display: grid;
      width: 42px;
      height: 42px;
      place-content: center;
      border-radius: 50%;
      background: var(--accent);
      color: var(--ink);
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }

    #storageIntroDescription {
      margin: 18px 0;
      color: var(--muted);

    }

    .storage-intro-dialog .confirm-dialog-actions .button {
      min-width: 150px;
    }

    .storage-intro-points {
      border-top: 1px solid var(--line-soft);
    }

    .storage-intro-points p {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      gap: 12px;
      margin: 0;
      border-bottom: 1px solid var(--line-soft);
      padding: 13px 0;
      font-size: 13px;
    }

    .storage-intro-points strong {
      font-weight: 700;
    }

    .storage-intro-points span,
    .storage-intro-pdf {
      color: var(--muted);
    }

    .storage-intro-pdf {
      margin: 16px 0 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .field > span,
    .field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0;
    }

    input,
    textarea,
    select {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      padding: 12px 14px;
      transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
    }

    input:hover,
    textarea:hover,
    select:hover {
      border-color: #969696;
    }

    input:focus,
    textarea:focus,
    select:focus,
    button:focus {
      outline: 0;
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(255, 133, 98, 0.22);

    input[type="range"] {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .entry-list {
      gap: 8px;
    }

    .entry-card {
      gap: 5px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      padding: 13px 14px;
      transition: background-color 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .entry-card:hover {
      border-color: #a8a8a8;
      background: #fafafa;
      box-shadow: none;
      transform: none;

    .entry-card.active {

      background: #f1f1f1;
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .entry-title {
      font-weight: 600;
    }

    .entry-meta {
      color: var(--muted);
      font-weight: 400;
    }

    .backup-box {

      padding-top: 18px;
    }

    .backup-status-title,

    .backup-status-detail {

    }

    .home-option small {
      color: var(--muted);
      font-size: 12px;

    .home-option-arrow {

      margin-left: 12px;
      font-size: 21px;
      line-height: 1;

      text-align: left;

    .eyebrow {

      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
    }

    .title-input,
    .registry-title {

      font-weight: 600;
      letter-spacing: 0;
    }

    .topbar > div:first-child {
      min-width: 0;
    }

    .title-field {

      max-width: 680px;
      gap: 6px;
    }

    }

    .title-field > span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
    }

    .title-field .title-input {
      width: 100%;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: var(--paper);
      padding: 9px 12px;
      font-size: 27px;
      line-height: 1.15;

    .title-field .title-input:focus {

      min-height: 38px;
      padding: 8px 14px;
      font-size: 12px;
    }

    .editor-panel,
    .empty-state {
      width: min(100%, 1120px);
      padding: 34px 40px 64px;
    }

    .meta-row {
      margin-bottom: 24px;
    }

      background: var(--paper);
      padding: 16px 18px;
      margin-bottom: 28px;
      box-shadow: none;

    }

    .notice h2 {
      font-size: 13px;
      font-weight: 600;
    }

    .notice ul {
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 400;
    }

    .protocol-intro {

      border-radius: 8px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: none;
    }

    .scenario-intro {
      background: var(--ink);
      color: var(--paper);
    }

    .report-intro {
      border-color: var(--line-soft);
      background: #f1f1f1;
      color: var(--ink);
    }

    .protocol-kicker {
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
    }

    .scenario-intro .protocol-kicker {
      color: #bdbdbd;
    }

    .protocol-intro h2 {
